<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Infection Tracking · Nirvana Living</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-green: #1d3d1d;
      --olive-green: #7a8a47;
      --bg-tan: #f5f2e9;
      --border-tan: #cdc4ad;
      --progress-yellow: #f4c542;
      --white: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0; padding: 0;
      background-color: var(--white);
      color: var(--dark-green);
    }

    /* --- Header Hierarchy --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: var(--white);
    }
    .logo img { height: 50px; width: auto; }
    
    .header-text { text-align: right; }
    .header-text h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      margin: 0;
      letter-spacing: -0.2px;
      line-height: 1;
    }
    .header-text p {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      margin: 2px 0 0 0;
      color: var(--olive-green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* --- Segmented Progress Bar --- */
    .progress-wrapper { padding: 0 20px 15px; }
    .segments { display: flex; gap: 5px; height: 6px; }
    .seg { flex: 1; background: #e0e0e0; border-radius: 2px; }
    .seg.active { background: var(--progress-yellow); }
    .step-counter { 
      text-align: center; 
      font-size: 11px; 
      margin-top: 8px; 
      font-weight: 600; 
      color: #333; 
    }

    /* --- Main Content (Tan Area) --- */
    main {
      background-color: var(--bg-tan);
      min-height: 80vh;
      padding: 40px 20px;
      border-top: 1px solid var(--border-tan);
    }

    .step-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--olive-green);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .question-heading {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 2.2rem; /* The "When did symptoms begin?" size */
      line-height: 1.1;
      margin: 0 0 12px 0;
      color: var(--dark-green);
    }

    .description {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 30px;
      color: var(--dark-green);
    }

    /* --- The Input Card --- */
    .card {
      background: var(--white);
      border: 1px solid var(--border-tan);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .card label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 11px;
      color: var(--olive-green);
      text-transform: uppercase;
      display: block;
      margin-bottom: 12px;
    }

    input[type="date"], input[type="text"], textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border-tan);
      border-radius: 8px;
      font-size: 18px;
      color: var(--dark-green);
      outline: none;
      font-family: inherit;
    }

    /* --- Buttons --- */
    .nav { margin-top: 40px; display: flex; gap: 12px; }
    .btn {
      flex: 1;
      padding: 18px;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }
    .btn-next { background: var(--dark-green); color: var(--white); }
    .btn-back { background: transparent; border: 1.5px solid var(--dark-green); color: var(--dark-green); }

    /* For selection logic */
    .option-btn {
      width: 100%; text-align: left; padding: 15px; margin-bottom: 10px;
      background: white; border: 1px solid var(--border-tan);
      border-radius: 10px; font-weight: 600; cursor: pointer;
    }
    .option-btn.active { background: var(--dark-green); color: white; border-color: var(--dark-green); }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="logo.png" alt="Nirvana Living">
    </div>
    <div class="header-text">
      <h1>INFECTION TRACKER</h1>
      <p>Cold & Flu Health Log</p>
    </div>
  </header>

  <div class="progress-wrapper">
    <div class="segments" id="progressBar">
      </div>
    <div class="step-counter" id="stepCounter">Step 1 of 6</div>
  </div>

  <main id="app">
    </main>

  <script>
    const steps = [
      { id: 1, label: "Step 01 — Episode Start", q: "When did symptoms begin?", desc: "Track and determine when, and how often, you get a cold or flu each year.", type: "date", field: "Symptom Start Date" },
      { id: 2, label: "Step 02 — Symptoms", q: "What are you feeling?", desc: "Select all that apply to this current infection episode.", type: "multi", options: ["Fatigue", "Sore Throat", "Cough", "Fever", "Headache"] },
      { id: 3, label: "Step 03 — Severity", q: "How intense is it?", desc: "Rate the impact on your daily life (0-9).", type: "range" },
      { id: 4, label: "Step 04 — Triggers", q: "Possible Triggers", desc: "What may have contributed to this episode?", type: "multi", options: ["Poor Sleep", "Stress", "Travel", "Alcohol"] },
      { id: 5, label: "Step 05 — Recovery", q: "When was recovery?", desc: "Record when you felt 100% back to normal.", type: "date", field: "Full Recovery Date" },
      { id: 6, label: "Step 06 — Summary", q: "Final Notes", desc: "Add any additional details about this episode.", type: "text", field: "Additional Notes" }
    ];

    let current = 0;
    let data = {};

    function render() {
      const s = steps[current];
      const app = document.getElementById('app');
      
      // Update Progress
      document.getElementById('stepCounter').innerText = `Step ${current + 1} of 6`;
      const pBar = document.getElementById('progressBar');
      pBar.innerHTML = steps.map((_, i) => `<div class="seg ${i <= current ? 'active' : ''}"></div>`).join('');

      let inputUI = '';
      if(s.type === 'date') {
        inputUI = `<div class="card"><label>${s.field}</label><input type="date" onchange="data['${s.label}'] = this.value"></div>`;
      } else if(s.type === 'multi') {
        inputUI = `<div class="options">` + s.options.map(opt => `<button class="option-btn" onclick="this.classList.toggle('active')">${opt}</button>`).join('') + `</div>`;
      } else if(s.type === 'range') {
        inputUI = `<div class="card"><label>Severity Score</label><input type="number" min="0" max="9" placeholder="0-9"></div>`;
      } else {
        inputHtml = `<div class="card"><label>${s.field}</label><textarea rows="4"></textarea></div>`;
      }

      app.innerHTML = `
        <span class="step-label">${s.label}</span>
        <h2 class="question-heading">${s.q}</h2>
        <p class="description">${s.desc}</p>
        ${inputUI}
        <div class="nav">
          ${current > 0 ? `<button class="btn btn-back" onclick="current--; render()">Back</button>` : ''}
          <button class="btn btn-next" onclick="moveNext()">${current === 5 ? 'Finish' : 'Next Step'}</button>
        </div>
      `;
    }

    function moveNext() {
      if(current < 5) { current++; render(); }
      else { alert("Log saved!"); }
    }

    render();
  </script>
</body>
</html>
