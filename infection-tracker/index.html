<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Infection Tracking · Nirvana Living</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=cormorant-garamond:400,400i,600|dm-sans:300,400,500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep:   #0E5000;
    --green-olive:  #859C2A;
    --green-forest: #405834;
    --green-light:  #BED26F;
    --gold:         #FFC700;
    --tan:          #C4B06D;
    --cream:        #FAE9C0;
    --white:        #FFFFFF;
    --text:         #1a1a1a;
    --text-muted:   #6b6b6b;
    --border:       #C4B06D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    background: var(--white);
    border-bottom: 3px solid var(--green-deep);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(14,80,0,0.08);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .header-logo {
    height: 52px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Cormorant Garamond', 'cormorant-garamond', Georgia, serif;
    color: var(--green-deep);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  .header-sub {
    font-size: 15px;
    color: var(--green-olive);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-top: 5px;
    font-weight: 400;
  }

  /* Progress */
  .progress-bar {
    display: flex;
    gap: 5px;
  }

  .progress-step {
    flex: 1;
    height: 4px;
    background: #e0ddd6;
    border-radius: 2px;
    transition: background 0.3s ease;
  }

  .progress-step.active  { background: var(--gold); }
  .progress-step.done    { background: var(--green-olive); }

  .step-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 5px;
    text-align: center;
    font-weight: 500;
  }

  /* Screens */
  .screen { display: none; padding: 24px 20px 110px; animation: fadeIn 0.3s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .screen-number {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green-olive);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .screen-title {
    font-family: 'Cormorant Garamond', 'cormorant-garamond', Georgia, serif;
    font-size: 30px;
    font-weight: 600;
    line-height: 1.15;
    margin-bottom: 6px;
    color: var(--green-deep);
  }

  .screen-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 24px;
  }

  /* Cards */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(14,80,0,0.05);
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--green-olive);
    margin-bottom: 10px;
    font-weight: 500;
  }

  /* Date input */
  input[type="date"] {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    font-size: 16px;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="date"]:focus { border-color: var(--green-deep); }

  /* Severity slider */
  .severity-value {
    font-family: 'Cormorant Garamond', 'cormorant-garamond', Georgia, serif;
    font-size: 52px;
    font-weight: 600;
    color: var(--green-deep);
    text-align: center;
    line-height: 1;
    margin-bottom: 2px;
  }

  .severity-label {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
    min-height: 18px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #859C2A 0%, #FFC700 50%, #c0392b 100%);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--white);
    border: 3px solid var(--green-deep);
    box-shadow: 0 2px 6px rgba(14,80,0,0.2);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }

  .slider-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    padding: 0 2px;
  }
  .slider-ticks span { font-size: 10px; color: var(--text-muted); }

  /* Symptom checklist */
  .symptom-row {
    display: flex;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid #f0ebe0;
    gap: 12px;
    cursor: pointer;
  }
  .symptom-row:last-child { border-bottom: none; }

  .symptom-check {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--white);
  }

  .symptom-row.checked .symptom-check {
    background: var(--green-deep);
    border-color: var(--green-deep);
  }

  .symptom-check svg { display: none; }
  .symptom-row.checked .symptom-check svg { display: block; }

  .symptom-name { font-size: 15px; flex: 1; color: var(--text); }
  .symptom-row.checked .symptom-name { color: var(--green-deep); font-weight: 500; }

  .mini-severity { display: flex; gap: 3px; opacity: 0; transition: opacity 0.2s; }
  .symptom-row.checked .mini-severity { opacity: 1; }

  .mini-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e0ddd6;
    cursor: pointer;
    transition: background 0.15s;
  }
  .mini-dot.active { background: var(--green-olive); }

  /* Chips */
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .chip {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    cursor: pointer;
    background: var(--white);
    color: var(--text);
    transition: all 0.15s;
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    user-select: none;
  }

  .chip.selected {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--white);
  }

  /* Inputs */
  input[type="text"], input[type="number"], textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  input[type="text"]:focus,
  input[type="number"]:focus,
  textarea:focus { border-color: var(--green-deep); }
  textarea { min-height: 90px; line-height: 1.55; }

  /* Stepper */
  .stepper {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--white);
  }

  .stepper-btn {
    width: 44px; height: 44px;
    border: none;
    background: #f5f0e8;
    font-size: 20px;
    color: var(--green-deep);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stepper-btn:active { background: var(--cream); }

  .stepper-val {
    flex: 1;
    text-align: center;
    font-size: 20px;
    font-weight: 500;
    color: var(--green-deep);
    font-family: 'Cormorant Garamond', 'cormorant-garamond', Georgia, serif;
  }

  /* Summary boxes */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }

  .summary-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .summary-box-val {
    font-family: 'Cormorant Garamond', 'cormorant-garamond', Georgia, serif;
    font-size: 38px;
    font-weight: 600;
    color: var(--green-deep);
    line-height: 1;
    margin-bottom: 4px;
  }

  .summary-box-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Export card */
  .export-card {
    background: var(--green-forest);
    border-radius: 12px;
    padding: 24px;
    color: var(--white);
    text-align: center;
    margin-top: 16px;
  }

  .export-card h3 {
    font-family: 'Cormorant Garamond', 'cormorant-garamond', Georgia, serif;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .export-card p {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .btn-export {
    background: var(--gold);
    color: var(--green-deep);
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }
  .btn-export:active { opacity: 0.85; }

  .optional-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: #f0ebe0;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 -2px 10px rgba(14,80,0,0.07);
  }

  .btn-back {
    flex: 1;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--white);
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-back:active { background: var(--cream); }

  .btn-next {
    flex: 2;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--green-deep);
    font-family: 'DM Sans', 'dm-sans', Helvetica Neue, Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-next:active { background: var(--green-forest); }
</style>
</head>
<body>
