<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Infection Tracking · Nirvana Living</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-green: #1d3d1d;
      --olive-green: #7a8a47;
      --bg-tan: #f5f2e9;
      --border-tan: #cdc4ad;
      --progress-yellow: #f1c40f;
      --white: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0; padding: 0;
      background-color: var(--white);
      color: var(--dark-green);
    }

    /* --- Header --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }
    .logo img { height: 45px; }
    .header-titles { text-align: right; }
    .header-titles h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 1.1rem; margin: 0;
      letter-spacing: 0.5px; line-height: 1;
    }
    .header-titles p {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400; font-size: 0.85rem; margin: 2px 0 0 0;
      color: var(--olive-green); text-transform: uppercase;
    }

    /* --- Progress --- */
    .progress-area { padding: 5px 20px 15px; }
    .segments { display: flex; gap: 4px; height: 6px; }
    .seg { flex: 1; background: #e0e0e0; border-radius: 2px; transition: 0.3s; }
    .seg.active { background: var(--progress-yellow); }
    .step-indicator { text-align: center; font-size: 11px; margin-top: 6px; font-weight: 600; color: #444; }

    /* --- Main Container --- */
    main {
      background-color: var(--bg-tan);
      min-height: 80vh;
      padding: 40px 20px 60px;
      border-top: 1px solid var(--border-tan);
    }

    .step-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: 11px;
      color: var(--olive-green); text-transform: uppercase;
      margin-bottom: 5px; display: block;
    }

    h2.question {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 2rem;
      line-height: 1.1; margin: 0 0 10px 0;
    }

    .desc { font-size: 14px; line-height: 1.4; margin-bottom: 25px; color: #2c4a2c; }

    /* --- Input Cards --- */
    .card {
      background: var(--white);
      border: 1px solid var(--border-tan);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .card label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: 10px;
      color: var(--olive-green); text-transform: uppercase;
      display: block; margin-bottom: 12px;
    }
    input[type="text"], input[type="date"], textarea {
      width: 100%; padding: 12px; border: 1px solid var(--border-tan);
      border-radius: 8px; font-size: 17px; outline: none; font-family: inherit;
    }

    /* --- Selection UI --- */
    .options-grid { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      padding: 15px; background: var(--white); border: 1px solid var(--border-tan);
      border-radius: 10px; font-weight: 600; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
    }
    .opt.selected { background: var(--dark-green); color: var(--white); border-color: var(--dark-green); }

    /* --- Severity Circles (PDF Style) --- */
    .severity-wrap { display: flex; justify-content: space-between; margin-top: 10px; }
    .sev-circle {
      width: 30px; height: 30px; border: 2px solid var(--dark-green);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; cursor: pointer; font-size: 12px;
    }
    .sev-circle.selected { background: var(--dark-green); color: white; }

    /* --- Counter Steppers --- */
    .stepper { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
    .step-btn {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--dark-green);
      background: white; font-size: 20px; font-weight: bold; cursor: pointer;
    }

    /* --- Navigation --- */
    .nav { margin-top: 30px; display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 16px; border-radius: 10px; border: none;
      font-family: 'Montserrat', sans-serif; font-weight: 700;
      text-transform: uppercase; font-size: 13px; cursor: pointer;
    }
    .btn-next { background: var(--dark-green); color: var(--white); }
    .btn-back { background: transparent; border: 1px solid var(--dark-green); color: var(--dark-green); }

    .hidden { display: none; }
  </style>
</head>
<body>
